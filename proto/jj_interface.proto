syntax = "proto3";

package jj_interface;

// Remote blob CAS (Layer C / M9, PLAN.md §13) + mutable refs (M10,
// PLAN.md §10). Byte-typed: callers pass a (kind, id) and bytes; the
// remote stores them as opaque blobs. Decoupled from the prost schemas
// in `JujutsuInterface` so a daemon-to-daemon remote keeps working
// across schema bumps. Same gRPC listener serves both services — every
// daemon can act as the remote for another.
//
// Auth, TLS, retry/backoff, streaming for large blobs are explicitly
// out of scope for M9; see §13.5/§13.6.
//
// M10 adds three ref RPCs (GetRef/CasRef/ListRefs) on the same
// service so the daemon-to-daemon "any peer can be a remote" property
// extends to the catalog. Refs are the mutable counterpart to blobs:
// a name → bytes map, arbitrated via compare-and-swap. See PLAN.md
// §10.1 for why one trait beats sibling traits, and §10.4 for the
// proto3 `optional` choice on the CAS preconditions.
service RemoteStore {
  rpc GetBlob(GetBlobReq) returns (GetBlobReply) {}
  rpc PutBlob(PutBlobReq) returns (PutBlobReply) {}
  rpc HasBlob(HasBlobReq) returns (HasBlobReply) {}

  // M10: mutable refs. Names are UTF-8 strings (jj-lib op-store keys
  // are too); values are arbitrary bytes (typically a 32-byte op id,
  // but the wire doesn't constrain).
  rpc GetRef(GetRefReq) returns (GetRefReply) {}
  rpc CasRef(CasRefReq) returns (CasRefReply) {}
  rpc ListRefs(ListRefsReq) returns (ListRefsReply) {}
}

// Which content-addressed table the (id, bytes) pair belongs to. Mirrors
// the four redb tables in `daemon/src/store.rs` (commits_v1, files_v1,
// symlinks_v1, trees_v1). Carrying the kind on the wire lets backends
// route by table (the same way redb does locally) and avoids confusing —
// though benign — content-hash collisions across kinds.
enum BlobKind {
  BLOB_KIND_UNSPECIFIED = 0;
  BLOB_KIND_TREE = 1;
  BLOB_KIND_BLOB = 2;
  BLOB_KIND_COMMIT = 4;
  BLOB_KIND_VIEW = 5;
  BLOB_KIND_OPERATION = 6;
  BLOB_KIND_EXTRA = 7;
}

message GetBlobReq {
  BlobKind kind = 1;
  bytes id = 2;
}
message GetBlobReply {
  // `found = false` distinguishes "remote doesn't have it" from "remote
  // has an empty blob". `bytes` is meaningless when `found == false`.
  bool found = 1;
  bytes bytes = 2;
}

message PutBlobReq {
  BlobKind kind = 1;
  bytes id = 2;
  bytes bytes = 3;
}
message PutBlobReply {}

message HasBlobReq {
  BlobKind kind = 1;
  bytes id = 2;
}
message HasBlobReply {
  bool found = 1;
}

// M10 — mutable refs (PLAN.md §10.4).
//
// Refs are the mutable counterpart to content-addressed blobs. CAS
// arbitration: callers send the value they expect to currently see;
// the server applies the swap iff the precondition matches, and
// returns the actual current value on conflict so the caller can
// retry against ground truth. proto3 `optional` on `expected`/`new`
// distinguishes "must not exist" from "must equal empty bytes" and
// "delete" from "set to empty" — the trait-side analog is
// `Option<&Bytes>`.

message GetRefReq {
  // UTF-8 name. Server validates: no NUL, no `/`, no `..` segments
  // — refs live in a flat namespace under `<remote>/refs/<name>`.
  string name = 1;
}
message GetRefReply {
  // false = ref does not exist. `value` is meaningless when found=false
  // and may be empty.
  bool found = 1;
  bytes value = 2;
}

message CasRefReq {
  string name = 1;
  // Absent = "must not currently exist" (create-only).
  // Present (even if empty) = "must equal these bytes".
  optional bytes expected = 2;
  // Absent = "delete this ref".
  // Present (even if empty) = "set ref to these bytes".
  optional bytes new = 3;
}
message CasRefReply {
  // true = swap applied. false = conflict; `actual` is the value the
  // server actually saw (absent if the ref does not exist), which the
  // caller should retry against.
  bool updated = 1;
  optional bytes actual = 2;
}

message ListRefsReq {}
message ListRefsReply {
  repeated string names = 1;
}

service JujutsuInterface {
  // Initalize a new repository
  rpc Initialize(InitializeReq) returns (InitializeReply) {}

  rpc DaemonStatus(DaemonStatusReq) returns (DaemonStatusReply) {}

  // M10.5 — catalog (mutable refs) on the per-mount level. Same shape
  // as the daemon-to-daemon `service RemoteStore` ref RPCs (§10.4) but
  // routed through the CLI's existing channel to its local daemon
  // rather than dialed directly. Carries `working_copy_path` so the
  // daemon can pick the per-mount catalog handle: when the mount has a
  // remote configured the request flows on to that remote's `cas_ref`/
  // `get_ref`/`list_refs`; when no remote is configured the daemon
  // services the request locally via `LocalRefs` (a redb table inside
  // the per-mount store.redb).
  //
  // Why a separate RPC name and not reuse the `RemoteStore` service:
  // the CLI needs `working_copy_path` routing, the `RemoteStore`
  // service is already-bound to a single backend per service instance.
  // Two services on one listener is the existing pattern (M9 §13.6).
  rpc GetCatalogRef(GetCatalogRefReq) returns (GetCatalogRefReply) {}
  rpc CasCatalogRef(CasCatalogRefReq) returns (CasCatalogRefReply) {}
  rpc ListCatalogRefs(ListCatalogRefsReq) returns (ListCatalogRefsReply) {}

  // Working copy related calls
  rpc SetCheckoutState(SetCheckoutStateReq) returns (SetCheckoutStateReply) {}
  rpc GetCheckoutState(GetCheckoutStateReq) returns (CheckoutState) {}

  rpc GetTreeState(GetTreeStateReq) returns (GetTreeStateReply) {}

  // Atomically swap the mount's currently-checked-out root tree.
  // Called by `LockedYakWorkingCopy::check_out` after jj has decided what
  // to materialize. The daemon updates `Mount.root_tree_id` and tells the
  // per-mount VFS to re-root, so subsequent reads through the mount see
  // the new tree. The new tree must already be in the per-mount store
  // (the CLI writes it via `WriteTree` before calling this).
  //
  // Errors: `not_found` if no such mount; `failed_precondition` if the
  // tree id isn't present in the store.
  rpc CheckOut(CheckOutReq) returns (CheckOutReply) {}

  rpc Snapshot(SnapshotReq) returns (SnapshotReply) {}

  // Store related calls.
  //
  // Each Mount owns its own keyspace (per-mount Store, decided at M4 per
  // docs/PLAN.md §7), so every store RPC carries `working_copy_path` on the
  // request side. The daemon looks up the Mount and dispatches to its Store.
  // Replies stay slim — the caller already knows which mount it spoke to.
  rpc GetEmptyTreeId(GetEmptyTreeIdReq) returns (TreeId) {}

  rpc WriteTree(WriteTreeReq) returns (TreeId) {}
  rpc ReadTree(ReadTreeReq) returns (Tree) {}

  rpc WriteFile(WriteFileReq) returns (FileId) {}
  rpc ReadFile(ReadFileReq) returns (File) {}

  rpc WriteSymlink(WriteSymlinkReq) returns (SymlinkId) {}
  rpc ReadSymlink(ReadSymlinkReq) returns (Symlink) {}

  rpc WriteCommit(WriteCommitReq) returns (CommitId) {}
  rpc ReadCommit(ReadCommitReq) returns (Commit) {}

  // M10.6 — op-store contents through the remote. The daemon stores
  // and forwards opaque bytes; the CLI handles serialization (jj-lib
  // simple_op_store proto format) and content hashing (BLAKE2b-512).
  // Ids are 64 bytes (not the 32-byte BLAKE3 ids used for tree/file/
  // symlink/commit data).
  rpc WriteView(WriteViewReq) returns (WriteViewReply) {}
  rpc ReadView(ReadViewReq) returns (ReadViewReply) {}
  rpc WriteOperation(WriteOperationReq) returns (WriteOperationReply) {}
  rpc ReadOperation(ReadOperationReq) returns (ReadOperationReply) {}
  rpc ResolveOperationIdPrefix(ResolveOperationIdPrefixReq)
      returns (ResolveOperationIdPrefixReply) {}

  // Git remote operations. The daemon's per-mount content store is a
  // bare git repo (post git-convergence). These RPCs manage git remotes
  // and drive push/fetch via git subprocess, matching `jj git` behavior.
  rpc GitRemoteAdd(GitRemoteAddReq) returns (GitRemoteAddReply) {}
  rpc GitRemoteList(GitRemoteListReq) returns (GitRemoteListReply) {}
  rpc GitPush(GitPushReq) returns (GitPushReply) {}
  rpc GitFetch(GitFetchReq) returns (GitFetchReply) {}
}


// M10.5 — per-mount catalog (mutable refs) message envelopes.
// Same `Option<bytes>` semantics as `CasRefReq`/`GetRefReply` on
// `service RemoteStore` (proto3 `optional` so absent-vs-empty round
// trips), but each carries `working_copy_path` so the daemon can
// route to the right per-mount catalog handle.

message GetCatalogRefReq {
  string working_copy_path = 1;
  string name = 2;
}
message GetCatalogRefReply {
  bool found = 1;
  bytes value = 2;
}

message CasCatalogRefReq {
  string working_copy_path = 1;
  string name = 2;
  optional bytes expected = 3;
  optional bytes new = 4;
}
message CasCatalogRefReply {
  bool updated = 1;
  optional bytes actual = 2;
}

message ListCatalogRefsReq {
  string working_copy_path = 1;
}
message ListCatalogRefsReply {
  repeated string names = 1;
}

message DaemonStatusReq {
}

message DaemonStatusReply {
  message Data {
    string path = 1;
    string remote = 2;
  }
  repeated Data data = 1;
}

message InitializeReq {
  string path = 1;
  string remote = 2;
}

// Polymorphic reply so the daemon can tell the CLI which transport it
// negotiated without leaking sentinel values into the wire format. Linux
// uses Fuse (mount happens daemon-side via the fusermount3 setuid helper);
// macOS uses Nfs and hands back the bound port for the CLI to feed into
// `mount_nfs`. New transports (virtio-fs, projected fs, etc.) get added as
// oneof variants — never as a magic field on a flat reply.
message InitializeReply {
  oneof transport {
    FuseTransport fuse = 1;
    NfsTransport nfs = 2;
  }
}

// FUSE: mount already happened daemon-side; CLI has nothing to do.
message FuseTransport {}

// NFS: daemon bound a port; CLI shells out to mount_nfs.
message NfsTransport {
  // Localhost port the daemon's NFS server listens on. Same value is used
  // for both `port` and `mountport` mount_nfs options.
  uint32 port = 1;
}

message SnapshotReq {
  string working_copy_path = 1;
}

message SnapshotReply {
  bytes tree_id = 1;
}

message CheckOutReq {
  string working_copy_path = 1;
  // The tree id to make the new root of the mount's working copy. Must
  // already be present in the per-mount store (write it with `WriteTree`
  // before issuing `CheckOut`).
  bytes new_tree_id = 2;
}

// Empty for now. Reserved for stats (added/updated/removed counts) once
// we synthesize them from the tree diff.
message CheckOutReply {}

message GetTreeStateReq {
  string working_copy_path = 1;
}
message GetTreeStateReply {
  bytes tree_id = 1;
}

// Store request envelopes. Each carries `working_copy_path` so the daemon
// can route to the correct per-mount Store. The body fields mirror the
// data-only message types below (File/Tree/Commit/etc.) which are also
// used as RPC reply payloads.

message GetEmptyTreeIdReq {
  string working_copy_path = 1;
}

message WriteFileReq {
  string working_copy_path = 1;
  bytes data = 2;
}

message ReadFileReq {
  string working_copy_path = 1;
  bytes file_id = 2;
}

message WriteSymlinkReq {
  string working_copy_path = 1;
  string target = 2;
}

message ReadSymlinkReq {
  string working_copy_path = 1;
  bytes symlink_id = 2;
}

message WriteTreeReq {
  string working_copy_path = 1;
  Tree tree = 2;
}

message ReadTreeReq {
  string working_copy_path = 1;
  bytes tree_id = 2;
}

message WriteCommitReq {
  string working_copy_path = 1;
  Commit commit = 2;
}

message ReadCommitReq {
  string working_copy_path = 1;
  bytes commit_id = 2;
}

message CheckoutState {
  bytes op_id = 1;
  bytes workspace_id = 2;
}

message SetCheckoutStateReply{}

message SetCheckoutStateReq {
  string working_copy_path = 1;
  CheckoutState checkout_state = 2;
}

message GetCheckoutStateReq {
  string working_copy_path = 1;
}

message FileId {
  bytes file_id = 1;
}

message File {
  bytes data = 1;
}

// Symlink

message Symlink {
  string target = 1;
}
message SymlinkId {
  bytes symlink_id = 1;
}

// Tree

message TreeId {
  bytes tree_id = 1;
}

message TreeValue {
  message File {
    bytes id = 1;
    bool executable = 2;
    bytes copy_id = 3;
  }

  oneof value {
    File file = 2;
    bytes symlink_id = 3;
    bytes tree_id = 4;
    bytes conflict_id = 5;
  }
}

message Tree {
  message Entry {
    string name = 1;
    TreeValue value = 2;
  }

  repeated Entry entries = 1;
}

// Commit

message CommitId {
  bytes commit_id = 1;
}

message Commit {
  repeated bytes parents = 1;
  repeated bytes predecessors = 2;
  // Alternating positive and negative terms
  repeated bytes root_tree = 3;
  // Labels for conflicted tree terms. Empty means unlabeled/resolved.
  repeated string conflict_labels = 10;
  // TODO(#1624): delete when all code paths can handle this format
  bool uses_tree_conflict_format = 8;
  bytes change_id = 4;
  string description = 5;

  message Timestamp {
    int64 millis_since_epoch = 1;
    int32 tz_offset = 2;
  }
  message Signature {
    string name = 1;
    string email = 2;
    Timestamp timestamp = 3;
  }
  Signature author = 6;
  Signature committer = 7;
  optional bytes secure_sig = 9;
}

// M10.6 — op-store RPCs. The daemon stores/forwards opaque bytes;
// serialization and content-hashing happen on the CLI side. Ids are
// raw bytes (64-byte BLAKE2b-512 hashes), not the 32-byte BLAKE3 ids
// used for tree/file/symlink/commit data.

message WriteViewReq {
  string working_copy_path = 1;
  bytes view_id = 2;
  bytes data = 3;
}
message WriteViewReply {}

message ReadViewReq {
  string working_copy_path = 1;
  bytes view_id = 2;
}
message ReadViewReply {
  bool found = 1;
  bytes data = 2;
}

message WriteOperationReq {
  string working_copy_path = 1;
  bytes operation_id = 2;
  bytes data = 3;
}
message WriteOperationReply {}

message ReadOperationReq {
  string working_copy_path = 1;
  bytes operation_id = 2;
}
message ReadOperationReply {
  bool found = 1;
  bytes data = 2;
}

message ResolveOperationIdPrefixReq {
  string working_copy_path = 1;
  // Hex prefix string (e.g. "a1b2c3"). The daemon scans its local
  // operations table for matching ids.
  string hex_prefix = 2;
}
message ResolveOperationIdPrefixReply {
  // 0 = no match, 1 = single match (full_id populated),
  // 2 = ambiguous match (multiple ids share the prefix).
  int32 resolution = 1;
  // Populated only when resolution == 1. Full raw bytes of the
  // matching operation id.
  bytes full_id = 2;
}

// Git remote operations (git convergence — see GIT_CONVERGENCE.md §git-remote-operations).
// The daemon's per-mount content store is a bare git repo. These messages
// drive git subprocess push/fetch and remote config, matching `jj git`.

message GitRemoteAddReq {
  string working_copy_path = 1;
  string name = 2;
  string url = 3;
}
message GitRemoteAddReply {}

message GitRemoteListReq {
  string working_copy_path = 1;
}
message GitRemoteListReply {
  message Remote {
    string name = 1;
    string url = 2;
  }
  repeated Remote remotes = 1;
}

message GitPushReq {
  string working_copy_path = 1;
  string remote = 2;
  repeated GitPushBookmark bookmarks = 3;
}
message GitPushBookmark {
  string name = 1;
  bytes commit_id = 2;
}
message GitPushReply {}

message GitFetchReq {
  string working_copy_path = 1;
  string remote = 2;
}
message GitFetchReply {
  repeated GitFetchedBookmark bookmarks = 1;
}
message GitFetchedBookmark {
  string name = 1;
  bytes commit_id = 2;
}

// Stdin/stdout framing protocol for `kiki kk serve` (SSH transport).
// Each message is length-prefixed (4-byte big-endian + protobuf bytes).
// The client sends StoreRequest, the server responds with StoreResponse.
// The id field is echoed back so the client can match responses.

message StoreRequest {
  uint64 id = 1;
  oneof request {
    GetBlobReq get_blob = 2;
    PutBlobReq put_blob = 3;
    HasBlobReq has_blob = 4;
    GetRefReq get_ref = 5;
    CasRefReq cas_ref = 6;
    ListRefsReq list_refs = 7;
  }
}

message StoreResponse {
  uint64 id = 1;
  oneof response {
    GetBlobReply get_blob = 2;
    PutBlobReply put_blob = 3;
    HasBlobReply has_blob = 4;
    GetRefReply get_ref = 5;
    CasRefReply cas_ref = 6;
    ListRefsReply list_refs = 7;
    StoreError error = 8;
  }
}

message StoreError {
  string message = 1;
}
