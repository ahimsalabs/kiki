syntax = "proto3";

package jj_interface;

service JujutsuInterface {
  // Initalize a new repository
  rpc Initialize(InitializeReq) returns (InitializeReply) {}

  rpc DaemonStatus(DaemonStatusReq) returns (DaemonStatusReply) {}

  // Working copy related calls
  rpc SetCheckoutState(SetCheckoutStateReq) returns (SetCheckoutStateReply) {}
  rpc GetCheckoutState(GetCheckoutStateReq) returns (CheckoutState) {}

  rpc GetTreeState(GetTreeStateReq) returns (GetTreeStateReply) {}

  // Atomically swap the mount's currently-checked-out root tree.
  // Called by `LockedYakWorkingCopy::check_out` after jj has decided what
  // to materialize. The daemon updates `Mount.root_tree_id` and tells the
  // per-mount VFS to re-root, so subsequent reads through the mount see
  // the new tree. The new tree must already be in the per-mount store
  // (the CLI writes it via `WriteTree` before calling this).
  //
  // Errors: `not_found` if no such mount; `failed_precondition` if the
  // tree id isn't present in the store.
  rpc CheckOut(CheckOutReq) returns (CheckOutReply) {}

  rpc Snapshot(SnapshotReq) returns (SnapshotReply) {}

  // Store related calls.
  //
  // Each Mount owns its own keyspace (per-mount Store, decided at M4 per
  // docs/PLAN.md §7), so every store RPC carries `working_copy_path` on the
  // request side. The daemon looks up the Mount and dispatches to its Store.
  // Replies stay slim — the caller already knows which mount it spoke to.
  rpc GetEmptyTreeId(GetEmptyTreeIdReq) returns (TreeId) {}

  rpc WriteTree(WriteTreeReq) returns (TreeId) {}
  rpc ReadTree(ReadTreeReq) returns (Tree) {}

  rpc WriteFile(WriteFileReq) returns (FileId) {}
  rpc ReadFile(ReadFileReq) returns (File) {}

  rpc WriteSymlink(WriteSymlinkReq) returns (SymlinkId) {}
  rpc ReadSymlink(ReadSymlinkReq) returns (Symlink) {}

  rpc WriteCommit(WriteCommitReq) returns (CommitId) {}
  rpc ReadCommit(ReadCommitReq) returns (Commit) {}
}


message DaemonStatusReq {
}

message DaemonStatusReply {
  message Data {
    string path = 1;
    string remote = 2;
  }
  repeated Data data = 1;
}

message InitializeReq {
  string path = 1;
  string remote = 2;
}

// Polymorphic reply so the daemon can tell the CLI which transport it
// negotiated without leaking sentinel values into the wire format. Linux
// uses Fuse (mount happens daemon-side via the fusermount3 setuid helper);
// macOS uses Nfs and hands back the bound port for the CLI to feed into
// `mount_nfs`. New transports (virtio-fs, projected fs, etc.) get added as
// oneof variants — never as a magic field on a flat reply.
message InitializeReply {
  oneof transport {
    FuseTransport fuse = 1;
    NfsTransport nfs = 2;
  }
}

// FUSE: mount already happened daemon-side; CLI has nothing to do.
message FuseTransport {}

// NFS: daemon bound a port; CLI shells out to mount_nfs.
message NfsTransport {
  // Localhost port the daemon's NFS server listens on. Same value is used
  // for both `port` and `mountport` mount_nfs options.
  uint32 port = 1;
}

message SnapshotReq {
  string working_copy_path = 1;
}

message SnapshotReply {
  bytes tree_id = 1;
}

message CheckOutReq {
  string working_copy_path = 1;
  // The tree id to make the new root of the mount's working copy. Must
  // already be present in the per-mount store (write it with `WriteTree`
  // before issuing `CheckOut`).
  bytes new_tree_id = 2;
}

// Empty for now. Reserved for stats (added/updated/removed counts) once
// we synthesize them from the tree diff.
message CheckOutReply {}

message GetTreeStateReq {
  string working_copy_path = 1;
}
message GetTreeStateReply {
  bytes tree_id = 1;
}

// Store request envelopes. Each carries `working_copy_path` so the daemon
// can route to the correct per-mount Store. The body fields mirror the
// data-only message types below (File/Tree/Commit/etc.) which are also
// used as RPC reply payloads.

message GetEmptyTreeIdReq {
  string working_copy_path = 1;
}

message WriteFileReq {
  string working_copy_path = 1;
  bytes data = 2;
}

message ReadFileReq {
  string working_copy_path = 1;
  bytes file_id = 2;
}

message WriteSymlinkReq {
  string working_copy_path = 1;
  string target = 2;
}

message ReadSymlinkReq {
  string working_copy_path = 1;
  bytes symlink_id = 2;
}

message WriteTreeReq {
  string working_copy_path = 1;
  Tree tree = 2;
}

message ReadTreeReq {
  string working_copy_path = 1;
  bytes tree_id = 2;
}

message WriteCommitReq {
  string working_copy_path = 1;
  Commit commit = 2;
}

message ReadCommitReq {
  string working_copy_path = 1;
  bytes commit_id = 2;
}

message CheckoutState {
  bytes op_id = 1;
  bytes workspace_id = 2;
}

message SetCheckoutStateReply{}

message SetCheckoutStateReq {
  string working_copy_path = 1;
  CheckoutState checkout_state = 2;
}

message GetCheckoutStateReq {
  string working_copy_path = 1;
}

message FileId {
  bytes file_id = 1;
}

message File {
  bytes data = 1;
}

// Symlink

message Symlink {
  string target = 1;
}
message SymlinkId {
  bytes symlink_id = 1;
}

// Tree

message TreeId {
  bytes tree_id = 1;
}

message TreeValue {
  message File {
    bytes id = 1;
    bool executable = 2;
    bytes copy_id = 3;
  }

  oneof value {
    File file = 2;
    bytes symlink_id = 3;
    bytes tree_id = 4;
    bytes conflict_id = 5;
  }
}

message Tree {
  message Entry {
    string name = 1;
    TreeValue value = 2;
  }

  repeated Entry entries = 1;
}

// Commit

message CommitId {
  bytes commit_id = 1;
}

message Commit {
  repeated bytes parents = 1;
  repeated bytes predecessors = 2;
  // Alternating positive and negative terms
  repeated bytes root_tree = 3;
  // Labels for conflicted tree terms. Empty means unlabeled/resolved.
  repeated string conflict_labels = 10;
  // TODO(#1624): delete when all code paths can handle this format
  bool uses_tree_conflict_format = 8;
  bytes change_id = 4;
  string description = 5;

  message Timestamp {
    int64 millis_since_epoch = 1;
    int32 tz_offset = 2;
  }
  message Signature {
    string name = 1;
    string email = 2;
    Timestamp timestamp = 3;
  }
  Signature author = 6;
  Signature committer = 7;
  optional bytes secure_sig = 9;
}
